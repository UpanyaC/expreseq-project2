<!DOCTYPE html>
<html>
<head>
    <title>{{ app.app_name }}</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0b1020; color: white; margin: 0; }
        .header { background: #2563eb; padding: 16px 24px; font-size: 22px; font-weight: bold; }
        .content { padding: 30px; }
        .card { background: rgba(255,255,255,0.06); border-radius: 12px; padding: 20px; margin-top: 20px; }
        a { color: white; background: #2563eb; padding: 10px 16px; text-decoration: none; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="header">{{ app.app_name }}</div>
    <div class="content">
        <h2>🔓 Access Granted</h2>
        <div class="card">
            <p>This is a protected demo page for <strong>{{ app.app_name }}</strong>.</p>
        </div>
        <br><a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
    </div>
</body>
</html>
